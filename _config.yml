# =============
# Build settings
# =============
remote_theme: "mmistakes/minimal-mistakes@4.28.0"
plugins:
  - jekyll-feed
  - jekyll-paginate # enables blog pagination
  - jekyll-remote-theme
  - jekyll-include-cache

# =============
# Pagination settings
# =============
paginate: 5 # number of posts per page
paginate_path: "/blog/page:num/" # URL structure for paginated pages

# =============
# Navigation settings
# =============
header:
    - title: "Home"
      url: "/"
    - title: "Blog"
      url: "/blog/"
    - title: "Projects"
      url: "/projects/"
    - title: "About"
      url: "/about/"



