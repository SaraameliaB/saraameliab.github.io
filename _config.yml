minimal_mistakes_skin: "dark" # optional: try "air", "contrast", etc.
locale: "en-US"

# Enable author profile in sidebar
author:
  name: Sara Amelia Bilic
  avatar: "/assets/images/profile.jpg" # add this image later
  bio: "Final year cybersecurity student at HOWEST University of Applied Sciences!"
  location: "Lede, Belgium"
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/SaraameliaB"
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://www.linkedin.com/in/sara-amelia-bilic-586ba3353/"

# =============
# Site Settings
# =============
title: "Sara Amelia Bilic's Digital Portfolio"
email: sara_bilic@outlook.com
description: # this means to ignore newlines until "baseurl:"
  "Welcome to my digital portfolio! I'm Sara Amelia Bilic, a final year cybersecurity student at HOWEST University of Applied Sciences. This portfolio showcases my projects, skills, and experiences in the field of cybersecurity. Feel free to explore and connect with me!"
baseurl: "" # the subpath of your site, e.g. /blog
url: "https://saraameliab.github.io/"



